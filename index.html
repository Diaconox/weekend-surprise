<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A thoughtful question</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #fdf6e3;
      font-family: 'Georgia', serif;
      overflow: hidden;
      color: #5f4b3e;
    }

    .card {
      background: white;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 15px 35px rgba(95, 75, 62, 0.15);
      text-align: center;
      max-width: 450px;
      width: 90%;
      border: 1px solid #eee;
      box-sizing: border-box;
    }

    .meme-img {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 25px;
      border: 5px solid #8eacbb;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      transition: all 0.3s ease;
    }

    h2 {
      font-size: 1.6rem;
      line-height: 1.4;
      margin-bottom: 35px;
      font-weight: 400;
    }

    /* Layout fisso a due colonne per non far sovrapporre i bottoni all'inizio */
    .btn-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      position: relative;
      height: 60px;
      width: 100%;
    }

    button {
      padding: 12px 20px;
      font-size: 1rem;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      transition: background-color 0.3s;
      font-family: 'Verdana', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #btn-si {
      background-color: #8eacbb;
      color: white;
    }

    #btn-si:hover {
      background-color: #7a9aa9;
    }

    #btn-no {
      background-color: #e6dfc8;
      color: #5f4b3e;
      width: 100%;
      box-sizing: border-box;
    }

    /* Stile per la dedica finale che apparirà dopo il click */
    .final-text {
      font-size: 1.8rem;
      color: #ff4757;
      margin-top: 15px;
      font-weight: bold;
      animation: fadeIn 1s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="card" id="main-card">
    <img id="main-img" src="pasta.png" alt="Sweet dogs eating pasta" class="meme-img">
    
    <h2 id="question-text">What do you think if, as soon as we find a job, we organize a weekend just for us to get to know each other better?</h2>
    
    <div class="btn-container" id="buttons-wrapper">
      <button id="btn-si" onclick="rispostaCorretta()">Absolutely yes, I can't wait.</button>
      <button id="btn-no">For now, better not.</button>
    </div>
  </div>

  <script>
    const btnNo = document.getElementById('btn-no');
    const mainImg = document.getElementById('main-img');
    const mainCard = document.getElementById('main-card');
    const questionText = document.getElementById('question-text');
    const buttonsWrapper = document.getElementById('buttons-wrapper');

    btnNo.addEventListener('mouseover', scappa);
    btnNo.addEventListener('touchstart', (e) => {
      e.preventDefault();
      scappa();
    });

    function scappa() {
      const maxX = window.innerWidth - 180;
      const maxY = window.innerHeight - 80;
      
      const x = Math.random() * maxX;
      const y = Math.random() * maxY;
      
      btnNo.style.position = 'fixed';
      btnNo.style.width = 'auto'; // Ripristina la larghezza corretta quando fluttua
      btnNo.style.left = x + 'px';
      btnNo.style.top = y + 'px';
    }

    function rispostaCorretta() {
      // 1. Cambia l'immagine con quella del bacio
      mainImg.src = "bacio.png";
      mainImg.style.borderColor = "#ff4757"; 
      
      // 2. Rimuove la domanda e i pulsanti dalla scheda
      questionText.style.display = 'none';
      buttonsWrapper.style.display = 'none';
      
      // 3. Crea e aggiunge la frase finale dolce dentro la scheda
      const testoFinale = document.createElement('p');
      testoFinale.className = 'final-text';
      testoFinale.innerText = 'I knew I was important to you.';
      mainCard.appendChild(testoFinale);
      
      // 4. Mostra il pop-up aggiornato in inglese dopo un brevissimo istante
      setTimeout(() => {
        alert('I knew you would make the right choice.');
      }, 300);
    }
  </script>

</body>
</html>
