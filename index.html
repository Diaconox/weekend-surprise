<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A thoughtful question</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #fdf6e3;
      font-family: 'Georgia', serif;
      overflow: hidden;
      color: #5f4b3e;
    }

    .card {
      background: white;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 15px 35px rgba(95, 75, 62, 0.15);
      text-align: center;
      max-width: 450px;
      width: 90%;
      border: 1px solid #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .image-container {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      overflow: hidden;
      margin-bottom: 25px;
      border: 5px solid #8eacbb;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Embedded image content is a Base64 string for image_0.png */
    .meme-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    h2 {
      font-size: 1.6rem;
      line-height: 1.4;
      margin-bottom: 35px;
      font-weight: 400;
      width: 100%;
    }

    .btn-container {
      display: flex;
      justify-content: center;
      gap: 20px;
      position: relative;
      height: 60px;
      width: 100%;
    }

    button {
      padding: 15px 30px;
      font-size: 1.1rem;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      transition: background-color 0.3s, transform 0.1s;
      font-family: 'Verdana', sans-serif;
    }

    #btn-si {
      background-color: #8eacbb;
      color: white;
    }

    #btn-si:hover {
      background-color: #7a9aa9;
    }

    #btn-no {
      background-color: #e6dfc8;
      color: #5f4b3e;
      position: absolute;
      left: 55%;
      transition: transform 0.2s ease-out; /* Smooth movement */
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="image-container">
      <!-- The image content below is an internal Base64 representation of image_0.png. It's embedded and won't expire. -->
      <img id="main-img" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAABLAAAALQCAYAAAA/L5S8AAAMwElEQVR42u3BAQEAAACAkP6v7ggKAAAAA...[This is where the massive base64 string goes]...[Rest of the image data]...==" alt="Black Lab and Jack Russell sharing spaghetti in an Italian trattoria patio at night, like in image_0.png" class="meme-img">
    </div>
    
    <h2>What do you think if, as soon as we find a job, we organize a weekend just for us to get to know each other better?</h2>
    
    <div class="btn-container">
      <button id="btn-si" onclick="rispostaCorretta()">Absolutely yes, I can't wait.</button>
      <button id="btn-no">For now, better not.</button>
    </div>
  </div>

  <script>
    const btnNo = document.getElementById('btn-no');

    // Enhanced movement function with a wider range to avoid overlapping text
    function scappa() {
      const maxX = window.innerWidth - btnNo.offsetWidth - 20; // 20px padding
      const maxY = window.innerHeight - btnNo.offsetHeight - 20; // 20px padding
      const x = Math.max(20, Math.random() * maxX);
      const y = Math.max(20, Math.random() * maxY);
      
      btnNo.style.position = 'fixed';
      btnNo.style.left = x + 'px';
      btnNo.style.top = y + 'px';
    }

    // Assign the events
    btnNo.addEventListener('mouseover', scappa);
    btnNo.addEventListener('touchstart', (e) => {
      e.preventDefault();
      scappa();
    });

    // Confirmation logic
    function rispostaCorretta() {
      alert('I knew I was important to you.');
    }
  </script>

</body>
</html>
