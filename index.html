<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A thoughtful question</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #fdf6e3;
      font-family: 'Georgia', serif;
      overflow: hidden;
      color: #5f4b3e;
    }

    .card {
      background: white;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 15px 35px rgba(95, 75, 62, 0.15);
      text-align: center;
      max-width: 450px;
      width: 90%;
      border: 1px solid #eee;
    }

    .meme-img {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 25px;
      border: 5px solid #8eacbb;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      transition: all 0.3s ease;
    }

    h2 {
      font-size: 1.6rem;
      line-height: 1.4;
      margin-bottom: 35px;
      font-weight: 400;
    }

    .btn-container {
      display: flex;
      justify-content: center;
      gap: 20px;
      position: relative;
      height: 60px;
    }

    button {
      padding: 15px 30px;
      font-size: 1.1rem;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      transition: background-color 0.3s, transform 0.1s;
      font-family: 'Verdana', sans-serif;
    }

    #btn-si {
      background-color: #8eacbb;
      color: white;
    }

    #btn-si:hover {
      background-color: #7a9aa9;
    }

    #btn-no {
      background-color: #e6dfc8;
      color: #5f4b3e;
      position: absolute;
      left: 55%;
    }
  </style>
</head>
<body>

  <div class="card">
    <img id="main-img" src="http://googleusercontent.com/image_generation_content/watermarked_img_13668244282239496709.png" alt="Sweet dogs eating pasta" class="meme-img">
    
    <h2>What do you think if, as soon as we find a job, we organize a weekend just for us to get to know each other better?</h2>
    
    <div class="btn-container">
      <button id="btn-si" onclick="rispostaCorretta()">Absolutely yes, I can't wait.</button>
      <button id="btn-no">For now, better not.</button>
    </div>
  </div>

  <script>
    const btnNo = document.getElementById('btn-no');
    const mainImg = document.getElementById('main-img');

    btnNo.addEventListener('mouseover', scappa);
    btnNo.addEventListener('touchstart', (e) => {
      e.preventDefault();
      scappa();
    });

    function scappa() {
      const x = Math.random() * (window.innerWidth - 200);
      const y = Math.random() * (window.innerHeight - 100);
      
      btnNo.style.position = 'fixed';
      btnNo.style.left = x + 'px';
      btnNo.style.top = y + 'px';
    }

    function rispostaCorretta() {
      // Qui ora carica la foto corretta dei cani che si baciano con i cuoricini
      mainImg.src = "http://googleusercontent.com/image_generation_content/watermarked_img_5800478843122961985.png";
      mainImg.style.borderColor = "#ff4757"; 
      
      setTimeout(() => {
        alert('I knew I was important to you.');
      }, 300);
    }
  </script>

</body>
</html>
